name: Release build

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  
on:
  release:
    types: [created]
  workflow_dispatch:
  
    inputs:
      create_prs:
        description: 'Criar PRs (correr depois de aprovar o sitepreview)'
        type: boolean
        default: false
jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      file_exists: ${{ steps.checkfile.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Check for publication-request.json
        id: checkfile
        run: |
          if [[ -f "publication-request.json" ]]; then
            echo "::set-output name=exists::true"
          else
            echo "::set-output name=exists::false"
          fi

  trigger:
    needs: check
    if: needs.check.outputs.file_exists == 'true'
    uses: hl7-pt/hl7-pt-webroot/.github/workflows/release.yml@main
    with:
      create_prs: ${{ github.event_name == 'workflow_dispatch' && inputs.create_prs == true }}
    secrets:
      github_token: ${{ secrets.HL7PT_PAT }}
#    with:
#      tag_name: ${{ github.event.release.tag_name }}
