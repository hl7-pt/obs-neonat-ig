# FILE: obs-neonat-ig/.github/workflows/release.yml
# CHANGES:
#   1. Fixed deprecated ::set-output → $GITHUB_OUTPUT
#   2. Bumped checkout action to v4
#   3. Fixed ref: funciona em release e workflow_dispatch
#   4. Corrigido package-id e URLs para noticia-nascimento
#   5. Adicionado input create_prs no workflow_dispatch
#   6. PRs criados automaticamente em release, opcionalmente em workflow_dispatch
#   7. Substituído secrets: inherit por PAT explícito para PRs cross-repo

name: Release build

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      file_exists: ${{ steps.checkfile.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Check for publication-request.json
        id: checkfile
        run: |
          if [[ -f "publication-request.json" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  trigger:
    needs: check
    if: needs.check.outputs.file_exists == 'true'
    uses: hl7-pt/hl7-pt-webroot/.github/workflows/release.yml@main
    with:
      pubreq_package_id: "hl7.fhir.pt.noticia-nascimento"
      pubreq_version: "1.0.0"
      pubreq_canonical: "https://hl7.pt/fhir/noticia-nascimento"
      pubreq_path: "https://hl7.pt/fhir/noticia-nascimento/1.0.0"
      create_prs: ${{ github.event_name == 'release' }}
    secrets:
      github_token: ${{ secrets.HL7PT_PAT }}
